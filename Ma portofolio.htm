<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirikwa JNR - Portfolio</title>
    <link rel="stylesheet" href="css/portfolio.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">SJ</h1>
            <ul class="nav-menu">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>SIRIKWA JNR</h1>
            <p>Frontend Developer & UI Designer</p>
            <button class="cta-button" id="viewWorkBtn">View My Work</button>
        </div>
        <div class="scroll-indicator"></div>
    </section>

    <section id="about" class="about">
        <div class="container">
            <h2>About Me</h2>
            <div class="about-content">
                <div class="about-text">
                    <p>Passionate developer with 1+ years of experience...</p>
                </div>
                <div class="skills">
                    <h3>Skills</h3>
                    <div class="skill-tags" id="skillTags"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="projects" class="projects">
        <div class="container">
            <h2>My Projects</h2>
            <div class="projects-grid" id="projectsGrid"></div>
        </div>
    </section>

    <footer id="contact" class="footer">
        <div class="container">
            <h2>Get In Touch</h2>
            <form class="contact-form" id="contactForm">
                <input type="text" placeholder="Name" required>
                <br>
                <input type="email" placeholder="Email" required>
                <br>
                <textarea placeholder="Message" required></textarea>
                <br>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </footer>

    <script src="js/portfolio.js"></script>
</body>
</html>
